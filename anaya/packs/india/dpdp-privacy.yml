pack:
  id: "india/dpdp-privacy"
  version: "0.1.0"
  name: "India DPDP Privacy"
  description: "Experimental DPDP Act aligned privacy and data-protection signals converted from legacy Indian data-security rules. This pack is not legal advice and does not prove full statutory compliance."
  last_updated: "2026-06-08"
  authors: ["Anaya Team"]
  sources:
    - url: "https://www.meity.gov.in/static/uploads/2024/02/Digital-Personal-Data-Protection-Act-2023.pdf"
      title: "Digital Personal Data Protection Act, 2023"
    - url: "https://www.indiacode.nic.in/handle/123456789/22037"
      title: "India Code: Digital Personal Data Protection Act, 2023"

rules:
  - id: "DPDP-DATA-001"
    name: "Sensitive Identifiers In Logs Or Files"
    description: "Personal identifiers such as Aadhaar and PAN should not be logged, printed, or written to unencrypted files."
    type: pattern
    severity: HIGH
    languages: [python, javascript, typescript]
    patterns:
      - regex: 'print\s*\([^)]*(?:aadhaar|aadhar|pan_number|pan_card|pan_no)[^)]*\)'
        description: "Matches print statements containing Aadhaar or PAN fields."
      - regex: 'log(?:ger)?\.(?:info|debug|warning|error)\s*\([^)]*(?:aadhaar|aadhar|pan_number|pan_card|pan_no)[^)]*\)'
        description: "Matches logger calls containing Aadhaar or PAN fields."
      - regex: 'f["''].*\{.*(?:aadhaar|aadhar|pan_number|pan_card|pan_no).*\}.*["'']'
        description: "Matches f-strings interpolating Aadhaar or PAN fields."
      - regex: 'open\s*\([^)]*["'']w["''][^)]*\).*(?:aadhaar|aadhar|pan_number|pan_card)'
        description: "Matches writes of Aadhaar or PAN fields to files."
    message: "Sensitive identifier appears in logs, output, or file writes at line {line}."
    fix_hint: "Mask or omit Aadhaar/PAN values and avoid writing them to unencrypted files."
    references:
      - url: "https://www.meity.gov.in/static/uploads/2024/02/Digital-Personal-Data-Protection-Act-2023.pdf"
        title: "DPDP Act, 2023, sections 2(t), 2(u), and 8(5)"
    tags: ["india", "dpdp", "dpdpa", "privacy", "pii"]
    enabled: true

  - id: "DPDP-DATA-002"
    name: "Hardcoded Credentials Or Secrets"
    description: "Database credentials, API keys, and secrets must not be hardcoded in source code."
    type: pattern
    severity: HIGH
    languages: [python, javascript, typescript]
    patterns:
      - regex: '(?:password|pwd|secret|api_key|access_token|private_key)\s*=\s*["''][^"'']{8,}["'']'
        description: "Matches long hardcoded values assigned to secret-like variables."
      - regex: 'conn\s*=\s*.*://[^:]+:[^@]+@'
        description: "Matches connection URLs with embedded credentials."
      - regex: 'mysql\.connector\.connect\s*\([^)]*password\s*=\s*["''][^"'']+["'']'
        description: "Matches MySQL connection calls with inline passwords."
      - regex: 'psycopg2\.connect\s*\([^)]*password\s*=\s*["''][^"'']+["'']'
        description: "Matches psycopg2 connection calls with inline passwords."
      - regex: 'SQLALCHEMY_DATABASE_URI\s*=\s*["''].*:[^:]+:[^@]+@.*["'']'
        description: "Matches SQLAlchemy database URIs with embedded credentials."
    message: "Hardcoded credential or secret appears at line {line}."
    fix_hint: "Load credentials from environment variables or a managed secret store."
    references:
      - url: "https://www.meity.gov.in/static/uploads/2024/02/Digital-Personal-Data-Protection-Act-2023.pdf"
        title: "DPDP Act, 2023, section 8(5)"
    tags: ["india", "dpdp", "dpdpa", "secrets", "security"]
    enabled: true

  - id: "DPDP-DATA-003"
    name: "Encryption Disabled Or Missing"
    description: "Encryption must be explicitly enabled for database connections and API calls handling sensitive data."
    type: pattern
    severity: MEDIUM
    languages: [python, javascript, typescript]
    patterns:
      - regex: 'ssl\s*=\s*False'
        description: "Matches SSL disabled flags."
      - regex: 'verify\s*=\s*False'
        description: "Matches TLS certificate verification disabled flags."
      - regex: 'SQLALCHEMY_ENGINE_OPTIONS.*ssl.*False'
        description: "Matches SQLAlchemy engine options disabling SSL."
      - regex: 'requests\.(?:get|post)\s*\([^)]*verify\s*=\s*False'
        description: "Matches Python requests calls with TLS verification disabled."
      - regex: 'mysql\.connector\.connect\s*\((?![^)]*ssl)'
        description: "Matches MySQL connection calls without an explicit SSL option."
    message: "Encryption or TLS verification appears disabled or missing at line {line}."
    fix_hint: "Enable TLS verification and require SSL options for sensitive database/API connections."
    references:
      - url: "https://www.meity.gov.in/static/uploads/2024/02/Digital-Personal-Data-Protection-Act-2023.pdf"
        title: "DPDP Act, 2023, section 8(5)"
    tags: ["india", "dpdp", "dpdpa", "tls", "encryption", "security"]
    enabled: true

  - id: "DPDP-DATA-004"
    name: "Unmasked PII In API Responses"
    description: "API responses should not expose full personal data fields such as email, phone, card, CVV, or account numbers unless necessary for a lawful purpose."
    type: pattern
    severity: HIGH
    languages: [python, javascript, typescript]
    patterns:
      - regex: 'return\s+jsonify\s*\(.*(?:email|phone|mobile|card_number|cvv|account_number).*\)'
        description: "Matches Flask jsonify responses containing sensitive PII fields."
      - regex: 'Response\s*\(.*(?:email|phone|mobile|card_number|cvv|account_number).*\)'
        description: "Matches response constructors containing sensitive PII fields."
      - regex: '\.json\s*\(\).*(?:email|phone|mobile|card_number|cvv|account_number)'
        description: "Matches JSON response handling involving sensitive PII fields."
    message: "API response may expose unmasked PII at line {line}."
    fix_hint: "Mask PII fields and only expose the minimum data needed by the caller."
    references:
      - url: "https://www.meity.gov.in/static/uploads/2024/02/Digital-Personal-Data-Protection-Act-2023.pdf"
        title: "DPDP Act, 2023, sections 4, 6(1), and 8(5)"
    tags: ["india", "dpdp", "dpdpa", "privacy", "pii", "minimization"]
    enabled: true

  - id: "DPDP-DATA-005"
    name: "Hardcoded Sensitive Configuration"
    description: "Sensitive configuration values must be loaded from environment variables, not hardcoded."
    type: pattern
    severity: MEDIUM
    languages: [python, javascript, typescript]
    patterns:
      - regex: 'API_KEY\s*=\s*["''][A-Za-z0-9]{20,}["'']'
        description: "Matches long hardcoded API key constants."
      - regex: 'SECRET_KEY\s*=\s*["''][^"'']{10,}["''](?!\s*#.*env)'
        description: "Matches hardcoded secret key constants without an env hint."
      - regex: 'DB_HOST\s*=\s*["''](?!localhost)[\w\.-]+["''](?!\s*os\.getenv)'
        description: "Matches hardcoded non-local database hosts."
      - regex: 'ENCRYPTION_KEY\s*=\s*["''][^"'']+["'']'
        description: "Matches hardcoded encryption key constants."
    message: "Sensitive configuration appears hardcoded at line {line}."
    fix_hint: "Load environment-specific configuration from environment variables or a secure config service."
    references:
      - url: "https://www.meity.gov.in/static/uploads/2024/02/Digital-Personal-Data-Protection-Act-2023.pdf"
        title: "DPDP Act, 2023, sections 8(4) and 8(5)"
    tags: ["india", "dpdp", "dpdpa", "configuration", "security"]
    enabled: true
