pack:
  id: "generic/secrets-detection"
  version: "1.0.0"
  name: "Secrets Detection"
  description: "Detects hardcoded secrets, credentials, and private keys."
  last_updated: "2026-02-21"
  authors: ["Anaya Team"]
  sources:
    - url: "https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/"
      title: "OWASP Top 10"

rules:
  - id: "ANAYA-SEC-001"
    name: "Hardcoded API Key"
    description: "API keys and tokens must not be hardcoded in source code."
    type: pattern
    severity: CRITICAL
    languages: [python, javascript, typescript, java, go, ruby, rust]
    patterns:
      - regex: '(api[_-]?key|access[_-]?token|secret[_-]?key|client[_-]?secret)\s*[:=]\s*["''][A-Za-z0-9_\-]{16,}["'']'
        description: "Matches long literal assigned to a key-like variable."
        exclude_patterns:
          - "os\\.getenv"
          - "process\\.env"
          - "your[_-]?(api[_-]?)?key"
          - "changeme"
          - "example"
    message: "Hardcoded API key-like value detected at line {line}."
    fix_hint: "Load the value from an environment variable or a secret manager."
    references:
      - url: "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
        title: "OWASP Secrets Management Cheat Sheet"
    tags: ["secrets", "owasp", "security"]
    enabled: true

  - id: "ANAYA-SEC-002"
    name: "Hardcoded Password"
    description: "Passwords must not be committed to source code."
    type: pattern
    severity: CRITICAL
    languages: [python, javascript, typescript, java, go, ruby, rust]
    patterns:
      - regex: '(password|passwd|pwd)\s*[:=]\s*["''][^"'']{8,}["'']'
        description: "Matches literal password assignments."
        exclude_patterns:
          - "os\\.getenv"
          - "process\\.env"
          - "your[_-]?password"
          - "changeme"
          - "example"
    message: "Hardcoded password detected at line {line}."
    fix_hint: "Read passwords from secret storage instead of source code."
    references:
      - url: "https://owasp.org/www-project-top-ten/"
        title: "OWASP Top 10"
    tags: ["secrets", "passwords"]
    enabled: true

  - id: "ANAYA-SEC-003"
    name: "Credentials In Database URL"
    description: "Database URLs must not contain embedded credentials."
    type: pattern
    severity: CRITICAL
    languages: [python, javascript, typescript, java, go, ruby, rust]
    patterns:
      - regex: '["''](?:postgres|postgresql|mysql|mongodb|redis)://[^:"'']+:[^@"'']+@[^"'']+["'']'
        description: "Matches connection strings with username and password."
        exclude_patterns:
          - "localhost"
          - "example"
          - "user:password"
    message: "Database connection string contains credentials at line {line}."
    fix_hint: "Use a secret manager or environment variable for database credentials."
    references:
      - url: "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
        title: "OWASP Secrets Management Cheat Sheet"
    tags: ["secrets", "database"]
    enabled: true

  - id: "ANAYA-SEC-004"
    name: "AWS Access Key"
    description: "AWS access keys must not appear in source code."
    type: pattern
    severity: CRITICAL
    languages: [python, javascript, typescript, java, go, ruby, rust]
    patterns:
      - regex: 'AKIA[0-9A-Z]{16}'
        description: "Matches AWS access key IDs."
    message: "AWS access key-like value detected at line {line}."
    fix_hint: "Rotate the key and load credentials through IAM or secret storage."
    references:
      - url: "https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html"
        title: "AWS access keys"
    tags: ["secrets", "aws"]
    enabled: true

  - id: "ANAYA-SEC-005"
    name: "Private Key Material"
    description: "Private key material must never be committed."
    type: pattern
    severity: CRITICAL
    languages: [python, javascript, typescript, java, go, ruby, rust]
    patterns:
      - regex: '-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
        description: "Matches PEM private key headers."
    message: "Private key material detected at line {line}."
    fix_hint: "Remove the key from Git, rotate it, and store it outside the repository."
    references:
      - url: "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/removing-sensitive-data-from-a-repository"
        title: "Removing sensitive data from a repository"
    tags: ["secrets", "private-key"]
    enabled: true

  - id: "ANAYA-SEC-006"
    name: "Hardcoded Authorization Header"
    description: "Authorization headers must not contain hardcoded bearer tokens."
    type: pattern
    severity: HIGH
    languages: [python, javascript, typescript, java, go, ruby, rust]
    patterns:
      - regex: 'Authorization["'']?\s*[:=]\s*["'']Bearer\s+[A-Za-z0-9_\-.]{20,}["'']'
        description: "Matches literal bearer tokens in authorization headers."
        exclude_patterns:
          - "process\\.env"
          - "os\\.getenv"
          - "example"
    message: "Hardcoded Authorization bearer token detected at line {line}."
    fix_hint: "Generate the Authorization header from a runtime secret."
    references:
      - url: "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
        title: "OWASP Secrets Management Cheat Sheet"
    tags: ["secrets", "http"]
    enabled: true
